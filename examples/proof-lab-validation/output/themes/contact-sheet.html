<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>Proof Lab Theme Validation</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 32px; background: #171717; color: #f5f5f5; font-family: Inter, Arial, sans-serif; }
    h1 { margin: 0 0 24px; font-weight: 440; font-size: 32px; }
    .grid { display: grid; grid-template-columns: repeat(3, 216px); gap: 20px 24px; }
    .theme { grid-column: 1 / -1; margin-top: 12px; font: 650 18px/1.2 ui-monospace, SFMono-Regular, Menlo, monospace; letter-spacing: .06em; text-transform: uppercase; color: #dedede; }
    figure { margin: 0; background: #fff; }
    img { width: 216px; height: 288px; display: block; object-fit: cover; }
    figcaption { padding: 8px; color: #111; font: 12px/1.2 ui-monospace, SFMono-Regular, Menlo, monospace; background: #fff; }
  </style>
</head>
<body>
  <h1>Proof Lab Theme Validation</h1>
  <div class="grid">
    
      <div class="theme">SL-01 Electric Blue</div>
      <figure><img src="images/electric-blue-01-proof-01-evidence-hero.png" alt="SL-01 Electric Blue card 1"><figcaption>electric-blue-01-proof-01-evidence-hero.png</figcaption></figure><figure><img src="images/electric-blue-02-proof-02-step-flow.png" alt="SL-01 Electric Blue card 2"><figcaption>electric-blue-02-proof-02-step-flow.png</figcaption></figure><figure><img src="images/electric-blue-03-proof-03-before-after.png" alt="SL-01 Electric Blue card 3"><figcaption>electric-blue-03-proof-03-before-after.png</figcaption></figure>
    
      <div class="theme">SL-02 Graphite Mint</div>
      <figure><img src="images/graphite-mint-01-proof-01-evidence-hero.png" alt="SL-02 Graphite Mint card 1"><figcaption>graphite-mint-01-proof-01-evidence-hero.png</figcaption></figure><figure><img src="images/graphite-mint-02-proof-02-step-flow.png" alt="SL-02 Graphite Mint card 2"><figcaption>graphite-mint-02-proof-02-step-flow.png</figcaption></figure><figure><img src="images/graphite-mint-03-proof-03-before-after.png" alt="SL-02 Graphite Mint card 3"><figcaption>graphite-mint-03-proof-03-before-after.png</figcaption></figure>
    
      <div class="theme">SL-03 Safety Coral</div>
      <figure><img src="images/safety-coral-01-proof-01-evidence-hero.png" alt="SL-03 Safety Coral card 1"><figcaption>safety-coral-01-proof-01-evidence-hero.png</figcaption></figure><figure><img src="images/safety-coral-02-proof-02-step-flow.png" alt="SL-03 Safety Coral card 2"><figcaption>safety-coral-02-proof-02-step-flow.png</figcaption></figure><figure><img src="images/safety-coral-03-proof-03-before-after.png" alt="SL-03 Safety Coral card 3"><figcaption>safety-coral-03-proof-03-before-after.png</figcaption></figure>
    
      <div class="theme">SL-04 Acid Lime</div>
      <figure><img src="images/acid-lime-01-proof-01-evidence-hero.png" alt="SL-04 Acid Lime card 1"><figcaption>acid-lime-01-proof-01-evidence-hero.png</figcaption></figure><figure><img src="images/acid-lime-02-proof-02-step-flow.png" alt="SL-04 Acid Lime card 2"><figcaption>acid-lime-02-proof-02-step-flow.png</figcaption></figure><figure><img src="images/acid-lime-03-proof-03-before-after.png" alt="SL-04 Acid Lime card 3"><figcaption>acid-lime-03-proof-03-before-after.png</figcaption></figure>
    
      <div class="theme">SL-05 Signal Noir</div>
      <figure><img src="images/signal-noir-01-proof-01-evidence-hero.png" alt="SL-05 Signal Noir card 1"><figcaption>signal-noir-01-proof-01-evidence-hero.png</figcaption></figure><figure><img src="images/signal-noir-02-proof-02-step-flow.png" alt="SL-05 Signal Noir card 2"><figcaption>signal-noir-02-proof-02-step-flow.png</figcaption></figure><figure><img src="images/signal-noir-03-proof-03-before-after.png" alt="SL-05 Signal Noir card 3"><figcaption>signal-noir-03-proof-03-before-after.png</figcaption></figure>
    
  </div>

</html>

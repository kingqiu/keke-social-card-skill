<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>Swiss Palette Contact Sheet</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 32px; background: #1a1a1a; color: #f7f7f7; font-family: Inter, Arial, sans-serif; }
    h1 { margin: 0 0 24px; font-weight: 400; font-size: 32px; }
    .grid { display: grid; grid-template-columns: repeat(3, 216px); gap: 20px 24px; }
    .row { display: contents; }
    .accent { grid-column: 1 / -1; margin-top: 12px; font: 600 18px/1.2 ui-monospace, SFMono-Regular, Menlo, monospace; letter-spacing: .08em; text-transform: uppercase; color: #d4d4d2; }
    figure { margin: 0; background: #fff; }
    img { width: 216px; height: 288px; display: block; object-fit: cover; }
    figcaption { padding: 8px; color: #111; font: 12px/1.2 ui-monospace, SFMono-Regular, Menlo, monospace; background: #fff; }
  </style>
</head>
<body>
  <h1>Swiss Palette Validation</h1>
  <div class="grid">
    <div class="accent">ikb</div>
    <figure><img src="images/ikb-01-xhs-01-cover.png" alt="ikb card 1"><figcaption>ikb-01-xhs-01-cover.png</figcaption></figure>
    <figure><img src="images/ikb-02-xhs-02-matrix.png" alt="ikb card 2"><figcaption>ikb-02-xhs-02-matrix.png</figcaption></figure>
    <figure><img src="images/ikb-03-xhs-03-verdict.png" alt="ikb card 3"><figcaption>ikb-03-xhs-03-verdict.png</figcaption></figure>
    <div class="accent">lemon-yellow</div>
    <figure><img src="images/lemon-yellow-01-xhs-01-cover.png" alt="lemon-yellow card 1"><figcaption>lemon-yellow-01-xhs-01-cover.png</figcaption></figure>
    <figure><img src="images/lemon-yellow-02-xhs-02-matrix.png" alt="lemon-yellow card 2"><figcaption>lemon-yellow-02-xhs-02-matrix.png</figcaption></figure>
    <figure><img src="images/lemon-yellow-03-xhs-03-verdict.png" alt="lemon-yellow card 3"><figcaption>lemon-yellow-03-xhs-03-verdict.png</figcaption></figure>
    <div class="accent">lemon-green</div>
    <figure><img src="images/lemon-green-01-xhs-01-cover.png" alt="lemon-green card 1"><figcaption>lemon-green-01-xhs-01-cover.png</figcaption></figure>
    <figure><img src="images/lemon-green-02-xhs-02-matrix.png" alt="lemon-green card 2"><figcaption>lemon-green-02-xhs-02-matrix.png</figcaption></figure>
    <figure><img src="images/lemon-green-03-xhs-03-verdict.png" alt="lemon-green card 3"><figcaption>lemon-green-03-xhs-03-verdict.png</figcaption></figure>
    <div class="accent">safety-orange</div>
    <figure><img src="images/safety-orange-01-xhs-01-cover.png" alt="safety-orange card 1"><figcaption>safety-orange-01-xhs-01-cover.png</figcaption></figure>
    <figure><img src="images/safety-orange-02-xhs-02-matrix.png" alt="safety-orange card 2"><figcaption>safety-orange-02-xhs-02-matrix.png</figcaption></figure>
    <figure><img src="images/safety-orange-03-xhs-03-verdict.png" alt="safety-orange card 3"><figcaption>safety-orange-03-xhs-03-verdict.png</figcaption></figure>
    <div class="accent">peacock</div>
    <figure><img src="images/peacock-01-xhs-01-cover.png" alt="peacock card 1"><figcaption>peacock-01-xhs-01-cover.png</figcaption></figure>
    <figure><img src="images/peacock-02-xhs-02-matrix.png" alt="peacock card 2"><figcaption>peacock-02-xhs-02-matrix.png</figcaption></figure>
    <figure><img src="images/peacock-03-xhs-03-verdict.png" alt="peacock card 3"><figcaption>peacock-03-xhs-03-verdict.png</figcaption></figure>
    <div class="accent">anthropic-clay</div>
    <figure><img src="images/anthropic-clay-01-xhs-01-cover.png" alt="anthropic-clay card 1"><figcaption>anthropic-clay-01-xhs-01-cover.png</figcaption></figure>
    <figure><img src="images/anthropic-clay-02-xhs-02-matrix.png" alt="anthropic-clay card 2"><figcaption>anthropic-clay-02-xhs-02-matrix.png</figcaption></figure>
    <figure><img src="images/anthropic-clay-03-xhs-03-verdict.png" alt="anthropic-clay card 3"><figcaption>anthropic-clay-03-xhs-03-verdict.png</figcaption></figure>
  </div>
</body>
</html>

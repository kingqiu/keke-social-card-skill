<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>Rednote Native Theme Validation</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 32px; background: #181514; color: #f7f3ee; font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif; }
    h1 { margin: 0 0 24px; font-size: 32px; }
    .grid { display: grid; grid-template-columns: repeat(2, 216px); gap: 20px 24px; }
    .theme { grid-column: 1 / -1; margin-top: 18px; font: 760 18px/1.2 ui-monospace, SFMono-Regular, Menlo, monospace; letter-spacing: .04em; text-transform: uppercase; color: #f7f3ee; }
    figure { margin: 0; background: #fff; }
    img { width: 216px; height: 288px; display: block; object-fit: cover; }
    figcaption { padding: 8px; color: #111; font: 12px/1.2 ui-monospace, SFMono-Regular, Menlo, monospace; background: #fff; }
  </style>
</head>
<body>
  <h1>Rednote Native Theme Validation</h1>
  <div class="grid">
    
      <div class="theme">plum-cream · default / refined Xiaohongshu · pass</div>
      <figure><img src="images/plum-cream-01-rn-theme-01-cover.png" alt="plum-cream card 1"><figcaption>plum-cream-01-rn-theme-01-cover.png</figcaption></figure><figure><img src="images/plum-cream-02-rn-theme-02-before-after.png" alt="plum-cream card 2"><figcaption>plum-cream-02-rn-theme-02-before-after.png</figcaption></figure>
    
      <div class="theme">berry-ink · high-click launch · pass</div>
      <figure><img src="images/berry-ink-01-rn-theme-01-cover.png" alt="berry-ink card 1"><figcaption>berry-ink-01-rn-theme-01-cover.png</figcaption></figure><figure><img src="images/berry-ink-02-rn-theme-02-before-after.png" alt="berry-ink card 2"><figcaption>berry-ink-02-rn-theme-02-before-after.png</figcaption></figure>
    
      <div class="theme">matcha-black · lifestyle / calm save value · pass</div>
      <figure><img src="images/matcha-black-01-rn-theme-01-cover.png" alt="matcha-black card 1"><figcaption>matcha-black-01-rn-theme-01-cover.png</figcaption></figure><figure><img src="images/matcha-black-02-rn-theme-02-before-after.png" alt="matcha-black card 2"><figcaption>matcha-black-02-rn-theme-02-before-after.png</figcaption></figure>
    
      <div class="theme">sky-butter · tutorial / light knowledge · pass</div>
      <figure><img src="images/sky-butter-01-rn-theme-01-cover.png" alt="sky-butter card 1"><figcaption>sky-butter-01-rn-theme-01-cover.png</figcaption></figure><figure><img src="images/sky-butter-02-rn-theme-02-before-after.png" alt="sky-butter card 2"><figcaption>sky-butter-02-rn-theme-02-before-after.png</figcaption></figure>
    
      <div class="theme">coral-blue · legacy compatibility only · pass</div>
      <figure><img src="images/coral-blue-01-rn-theme-01-cover.png" alt="coral-blue card 1"><figcaption>coral-blue-01-rn-theme-01-cover.png</figcaption></figure><figure><img src="images/coral-blue-02-rn-theme-02-before-after.png" alt="coral-blue card 2"><figcaption>coral-blue-02-rn-theme-02-before-after.png</figcaption></figure>
    
  </div>
</body>
</html>

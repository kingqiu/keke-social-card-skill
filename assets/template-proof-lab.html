<!doctype html>
<html lang="zh-CN" data-system="signal-ledger" data-theme="SL-02 Graphite Mint">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Keke Proof Lab Seed</title>
<style>
:root {
  --sl-display: "IBM Plex Sans", Inter, "Source Han Sans SC", "Noto Sans CJK SC", "PingFang SC", "Noto Sans", system-ui, sans-serif;
  --sl-body: "IBM Plex Sans", Inter, "Source Han Sans SC", "Noto Sans CJK SC", "PingFang SC", "Noto Sans", system-ui, sans-serif;
  --sl-label: "IBM Plex Sans", Inter, "Source Han Sans SC", "Noto Sans CJK SC", "PingFang SC", system-ui, sans-serif;
  --sl-num: "IBM Plex Sans", Inter, "Source Han Sans SC", "Noto Sans CJK SC", "PingFang SC", system-ui, sans-serif;
  --sl-mono: "IBM Plex Mono", "SFMono-Regular", "Roboto Mono", Consolas, monospace;
  --bg: #F6F5F1;
  --surface: #FFFFFF;
  --fg: #171A1D;
  --muted: #6D7680;
  --accent: #47756F;
  --line: #DCE3E1;
  --grid: #E5ECEA;
  --dark: #141817;
  --soft: color-mix(in srgb, var(--accent) 8%, var(--surface));
  --proof-on-dark: var(--bg);
}
html[data-theme="SL-01 Electric Blue"] {
  --bg: #F7F6F2;
  --surface: #FFFFFF;
  --fg: #15181D;
  --muted: #6C7580;
  --accent: #2F5EA7;
  --line: #DCE3EE;
  --grid: #E7EDF5;
  --dark: #12161D;
}
html[data-theme="SL-02 Graphite Mint"] {
  --bg: #F6F5F1;
  --surface: #FFFFFF;
  --fg: #171A1D;
  --muted: #6D7680;
  --accent: #47756F;
  --line: #DCE3E1;
  --grid: #E5ECEA;
  --dark: #141817;
}
html[data-theme="SL-03 Safety Coral"] {
  --bg: #F7F4F0;
  --surface: #FFFFFF;
  --fg: #171515;
  --muted: #746B67;
  --accent: #B84932;
  --line: #E5D9D4;
  --grid: #EFE5E1;
  --dark: #161514;
}
html[data-theme="SL-04 Acid Lime"] {
  --bg: #F5F7EF;
  --surface: #FFFFFF;
  --fg: #151715;
  --muted: #6E7369;
  --accent: #566F10;
  --line: #DDE5CC;
  --grid: #E7ECD8;
  --dark: #151713;
}
html[data-theme="SL-05 Signal Noir"] {
  --bg: #131110;
  --surface: #1C1916;
  --fg: #F2ECDF;
  --muted: #A29A8C;
  --accent: #C9A461;
  --line: #2E2A24;
  --grid: #221E18;
  --dark: #0C0A08;
  --proof-on-dark: var(--fg);
}
* { box-sizing: border-box; }
body { margin: 0; background: var(--grid); font-family: var(--sl-body); }
.poster {
  width: 1080px;
  height: 1440px;
  background:
    linear-gradient(90deg, color-mix(in srgb, var(--accent) 8%, transparent), transparent 44%),
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px),
    var(--bg);
  background-size: auto, 64px 64px, 64px 64px, auto;
  color: var(--fg);
  padding: 66px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}
.sl-label { font-family: var(--sl-label); font-size: 16px; line-height: 1; letter-spacing: .08em; font-weight: 640; color: var(--accent); }
.sl-display { font-family: var(--sl-display); font-size: 72px; line-height: 1.00; letter-spacing: 0; font-weight: 580; margin: 0; }
.sl-body { font-family: var(--sl-body); font-size: 25px; line-height: 1.38; letter-spacing: 0; font-weight: 440; color: var(--muted); margin: 0; }
.sl-caption { font-family: var(--sl-label); font-size: 15px; line-height: 1.28; letter-spacing: .04em; color: var(--muted); }
.sl-number { font-family: var(--sl-num); font-size: 34px; line-height: 1; letter-spacing: 0; font-weight: 620; color: var(--accent); font-variant-numeric: tabular-nums; }
.sl-mono { font-family: var(--sl-mono); font-size: 18px; line-height: 1.34; letter-spacing: 0; font-variant-numeric: tabular-nums; }
.sl-quote { font-family: var(--sl-display); font-size: 38px; line-height: 1.12; font-weight: 520; }
.latin { font-family: var(--sl-label); }
.num { font-family: var(--sl-num); font-variant-numeric: tabular-nums; }
.mono { font-family: var(--sl-mono); font-variant-numeric: tabular-nums; }
.surface { background: var(--surface); border: 1px solid var(--line); padding: 28px; }
.proof-frame { background: var(--surface); color: var(--fg); border: 1px solid color-mix(in srgb, var(--accent) 26%, var(--line)); padding: 22px; }
.pl-page { height:100%; display:grid; grid-template-rows:auto 1fr auto; gap:26px; }
.pl-head { display:grid; gap:14px; }
.pl-title { margin:0; font-family:var(--sl-display); font-size:78px; line-height:.98; letter-spacing:0; font-weight:640; max-width:930px; }
.pl-subtitle { margin:0; font-size:28px; line-height:1.32; color:var(--muted); font-weight:470; max-width:850px; }
.pl-proof-layout { min-height:0; display:grid; grid-template-rows:minmax(650px, 1fr) auto; gap:22px; }
.pl-evidence-hero { position:relative; min-height:0; border-radius:34px; overflow:hidden; background:var(--surface); color:var(--fg); box-shadow:0 22px 56px rgba(20,24,23,.13); border:1px solid color-mix(in srgb, var(--accent) 20%, var(--line)); }
.pl-evidence-hero img { width:100%; height:100%; object-fit:cover; display:block; }
.pl-evidence-hero.contain img { object-fit:contain; background:var(--surface); padding:26px; }
.pl-browser-bar { position:absolute; left:0; right:0; top:0; height:54px; display:flex; align-items:center; gap:10px; padding:0 22px; background:color-mix(in srgb, var(--surface) 88%, transparent); backdrop-filter:blur(10px); border-bottom:1px solid var(--line); }
.pl-dot { width:14px; height:14px; border-radius:50%; background:var(--accent); }
.pl-dot:nth-child(2) { background:color-mix(in srgb, var(--accent) 32%, var(--line)); }
.pl-dot:nth-child(3) { background:color-mix(in srgb, var(--muted) 52%, var(--line)); }
.pl-zoom-card { position:absolute; right:28px; bottom:28px; width:330px; background:var(--surface); color:var(--fg); border:1px solid var(--line); padding:20px; box-shadow:0 16px 40px rgba(20,24,23,.13); }
.pl-zoom-card b { display:block; font-size:28px; line-height:1.08; margin-bottom:8px; }
.pl-zoom-card span { display:block; font-size:21px; line-height:1.25; color:var(--muted); }
.pl-proof-inspector { padding:22px; display:grid; grid-template-rows:minmax(0,1fr) auto; gap:16px; align-items:stretch; }
.pl-inspector-media { min-height:0; border-radius:18px; overflow:hidden; border:1px solid var(--line); background:var(--surface); display:grid; place-items:center; }
.pl-inspector-media img { width:100%; height:100%; object-fit:contain; display:block; background:var(--surface); }
.pl-inspector-rail { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
.pl-inspector-rail span { display:block; min-height:76px; padding:12px 14px; background:var(--surface); color:var(--fg); border:1px solid var(--line); font-size:20px; line-height:1.18; font-weight:640; }
.pl-inspector-rail b { display:block; margin-bottom:6px; color:var(--accent); font-size:14px; line-height:1; letter-spacing:.08em; font-family:var(--sl-label); }
.pl-callout-row { display:grid; grid-template-columns:repeat(2,1fr); gap:18px; }
.pl-callout { background:var(--surface); border:1px solid var(--line); padding:24px; min-height:170px; display:flex; flex-direction:column; justify-content:space-between; box-shadow:0 12px 34px rgba(20,24,23,.08); }
.pl-callout h3 { margin:0; font-size:36px; line-height:1.02; font-weight:640; }
.pl-callout p { margin:12px 0 0; font-size:24px; line-height:1.32; color:var(--muted); }
.pl-step-flow { min-height:0; display:grid; grid-template-columns:repeat(3,1fr); gap:18px; align-items:stretch; }
.pl-step { background:var(--surface); border:1px solid var(--line); padding:24px; display:grid; grid-template-rows:auto 1fr auto; gap:18px; }
.pl-step-num { font-family:var(--sl-num); font-size:62px; line-height:.9; font-weight:620; color:var(--accent); }
.pl-step h3 { margin:0; font-size:34px; line-height:1.05; font-weight:650; }
.pl-step p { margin:0; font-size:23px; line-height:1.32; color:var(--muted); }
.pl-mini-proof { background:var(--soft); border:1px solid var(--line); min-height:220px; display:grid; place-items:center; padding:16px; color:var(--muted); font-size:22px; }
.pl-before-after { min-height:0; display:grid; grid-template-columns:1fr 1fr; gap:20px; }
.pl-proof-side { background:var(--surface); border:1px solid var(--line); padding:22px; display:flex; flex-direction:column; gap:18px; }
.pl-proof-side h3 { margin:0; font-size:38px; line-height:1; }
.pl-shot-box { flex:1; min-height:0; background:var(--soft); border:1px solid var(--line); display:grid; place-items:center; overflow:hidden; }
.pl-shot-box img { width:100%; height:100%; object-fit:cover; }
.pl-before-after .pl-shot-box { flex:0 0 650px; height:650px; }
.pl-takeaway { display:flex; justify-content:space-between; align-items:center; gap:18px; padding:20px 0 0; border-top:1px solid var(--line); color:var(--muted); font-size:21px; }
.brand-signature::before { content:"「两克伴」出品"; }
</style>
</head>
<body>

</body>
</html>
